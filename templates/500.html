{% extends "base.html" %}

{% block title %}Server Error - MCQ Quiz{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 100px;">
    <div class="card" style="text-align: center; padding: 50px;">
        <div style="font-size: 120px; color: #dc3545;">⚠️</div>
        <h1 style="color: #dc3545; font-size: 72px; margin: 20px 0;">500</h1>
        <h2 style="margin-bottom: 20px;">Internal Server Error</h2>
        <p style="color: #666; font-size: 18px; margin-bottom: 30px;">
            Something went wrong on our end.<br>
            Our team has been notified and we're working to fix it.
        </p>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <a href="{{ url_for('index') }}" class="btn btn-primary" style="padding: 12px 30px; text-decoration: none; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 8px; font-weight: 600;">
                🏠 Go to Home
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary" style="padding: 12px 30px; text-decoration: none; background: #6c757d; color: white; border-radius: 8px; font-weight: 600;">
                ← Go Back
            </a>
        </div>
    </div>
</div>
{% endblock %}
