{% extends "base.html" %}

{% block title %}Admin Panel{% endblock %}

{% block content %}
<div class="admin-container">
    <h1>Admin Panel - Question Management</h1>

    <div class="admin-tabs">
        <button class="tab-btn active" onclick="showTab('add')">➕ Add Question</button>
        <button class="tab-btn" onclick="showTab('view')">📋 View Questions</button>
        <button class="tab-btn" onclick="showTab('update')">✏️ Update Question</button>
        <button class="tab-btn" onclick="showTab('delete')">🗑️ Delete Question</button>
    </div>

    <!-- Add Question Tab -->
    <div id="add-tab" class="tab-content active">
        <h2>Add New Question</h2>
        <form id="add-form" class="admin-form">
            <div class="form-group">
                <label>Question Text</label>
                <textarea name="question_text" required rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Option A</label>
                    <input type="text" name="option_a" required>
                </div>
                <div class="form-group">
                    <label>Option B</label>
                    <input type="text" name="option_b" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Option C</label>
                    <input type="text" name="option_c" required>
                </div>
                <div class="form-group">
                    <label>Option D</label>
                    <input type="text" name="option_d" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Correct Option (exact text)</label>
                    <input type="text" name="correct_option" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select name="subject" required>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Add Question</button>
        </form>
    </div>

    <!-- View Questions Tab -->
    <div id="view-tab" class="tab-content">
        <h2>All Questions</h2>
        <div class="filter-bar">
            <select id="subject-filter" onchange="loadQuestions()">
                <option value="">All Subjects</option>
                <option value="Mathematics">Mathematics</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Biology">Biology</option>
            </select>
            <input type="text" id="search-box" placeholder="Search questions..." onkeyup="searchQuestions()">
        </div>
        <div id="questions-list" class="questions-list">
            <!-- Questions will be loaded here via AJAX -->
        </div>
    </div>

    <!-- Update Question Tab -->
    <div id="update-tab" class="tab-content">
        <h2>Update Question</h2>
        <div class="form-group">
            <label>Select Question ID</label>
            <input type="number" id="update-qid" placeholder="Enter Question ID" onchange="loadQuestionData(this.value)">
        </div>
        <form id="update-form" class="admin-form">
            <input type="hidden" name="q_id" id="update-q-id">
            <div class="form-group">
                <label>Question Text</label>
                <textarea name="question_text" id="update-question" required rows="3"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Option A</label>
                    <input type="text" name="option_a" id="update-option-a" required>
                </div>
                <div class="form-group">
                    <label>Option B</label>
                    <input type="text" name="option_b" id="update-option-b" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Option C</label>
                    <input type="text" name="option_c" id="update-option-c" required>
                </div>
                <div class="form-group">
                    <label>Option D</label>
                    <input type="text" name="option_d" id="update-option-d" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Correct Option</label>
                    <input type="text" name="correct_option" id="update-correct" required>
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <select name="subject" id="update-subject" required>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Physics">Physics</option>
                        <option value="Chemistry">Chemistry</option>
                        <option value="Biology">Biology</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Update Question</button>
        </form>
    </div>

    <!-- Delete Question Tab -->
    <div id="delete-tab" class="tab-content">
        <h2>Delete Question</h2>
        <div class="form-group">
            <label>Enter Question ID to Delete</label>
            <input type="number" id="delete-qid" placeholder="Enter Question ID">
        </div>
        <div id="delete-preview" class="delete-preview">
            <!-- Question preview will appear here -->
        </div>
        <button onclick="deleteQuestion()" class="btn btn-danger">Delete Question</button>
    </div>
</div>

<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
